name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Đảm bảo tên nhánh là main (hoặc master tùy repo của bạn)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Chỉ định phiên bản pnpm

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # Thiết lập cache cho pnpm để tăng tốc độ build

      - name: Install dependencies
        # Sử dụng --no-frozen-lockfile để tránh lỗi nếu bạn lỡ quên update lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Generate Static Site
        # Lệnh này sẽ tạo ra thư mục .output/public
        run: pnpm run generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4